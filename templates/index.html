{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <h1>✨ Todo List</h1>
        
        <form method="POST" class="todo-form">
            {% csrf_token %}
            <input 
                type="text" 
                name="name" 
                placeholder="What needs to be done?" 
                class="input-name"
                required
                autocomplete="off"
            >
            <textarea 
                name="description" 
                placeholder="Add a description (optional)" 
                class="input-description"
                rows="2"
            ></textarea>
            <button type="submit" class="btn-add">Add Todo</button>
        </form>

        <div class="todo-list">
            {% for todo in todos %}
                <div class="todo-item {% if todo.completed %}completed{% endif %}">
                    <div class="todo-content">
                        <h3 class="todo-name">{{ todo.name }}</h3>
                        {% if todo.description %}
                            <p class="todo-description">{{ todo.description }}</p>
                        {% endif %}
                        <small class="todo-date">{{ todo.created_at|date:"M d, Y H:i" }}</small>
                    </div>
                    <div class="todo-actions">
                        <form action="{% url 'toggle_todo' todo.id %}" method="POST" class="action-form">
                            {% csrf_token %}
                            <button type="submit" class="btn-toggle" title="Toggle completion">
                                {% if todo.completed %}↩️{% else %}✅{% endif %}
                            </button>
                        </form>
                        <form action="{% url 'delete_todo' todo.id %}" method="POST" class="action-form">
                            {% csrf_token %}
                            <button type="submit" class="btn-delete" title="Delete">🗑️</button>
                        </form>
                    </div>
                </div>
            {% empty %}
                <div class="empty-state">
                    <p>No todos yet! Add one above 🚀</p>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
